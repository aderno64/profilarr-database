name: Mirror v2 Branch

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  mirror-v2-filtered:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout My Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_PAT }}
          fetch-depth: 0

      - name: Sync and Filter v2
        run: |
          # 1. Setup the remote
          git remote add upstream https://github.com/Dumpstarr/Database.git
          git fetch upstream v2

          # 2. Force create a local 'v2' branch based on the remote's v2
          git checkout -B v2 upstream/v2

          # 3. Remove the .github directory and commit the deletion
          if [ -d ".github" ]; then
            git rm -rf .github
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Mirror: Sync v2 and remove remote .github folder"
          fi

          # 4. Force push the "cleaned" v2 branch to your repo
          git push origin v2 --force
