name: Pull Configs from Remote

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  pull-folders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout My Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_PAT }}

      - name: Fetch Specific Folders from Remote
        run: |
          # 1. Clone the remote repo into a temporary folder (sparse mode)
          git clone --depth 1 --filter=blob:none --sparse https://github.com/Dumpstarr/Database.git temp_remote
          cd temp_remote
          
          # 2. Define which folders to pull
          git sparse-checkout set custom_formats media_management profiles regex_patterns
          
          # 3. Move them into the root of your current repo
          # (using 'cp -R' to ensure all descending items are included)
          cp -R custom_formats ../
          cp -R media_management ../
          cp -R profiles ../
          cp -R regex_patterns ../
          
          cd ..
          rm -rf temp_remote

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_formats/ media_management/ profiles/ regex_patterns/
          
          # Only commit if there are actually changes to avoid workflow errors
          if git diff --staged --quiet; then
            echo "No changes detected in remote folders."
          else
            git commit -m "Automated Sync: Pulled latest configs from remote"
            git push
          fi