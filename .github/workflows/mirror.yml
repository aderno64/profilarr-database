name: Mirror Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror all branches
        run: |
          git clone --bare https://github.com/Dumpstarr/Database.git repo
          cd repo
          git remote set-url origin https://x-access-token:${{ secrets.REPO_PAT }}@github.com/DumpstarrFire/Database.git
          git push origin 'refs/heads/*:refs/heads/*' 'refs/tags/*:refs/tags/*' --force
