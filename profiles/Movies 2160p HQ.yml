name: Movies 2160p HQ
description: 'This profile is like the primary Movie profile, but with merged source
  qualities. This results in higher-quality, WEB releases being preferred. This usually
  results in higher-quality audio, higher video bitrates and 30% larger file size.

  - This profile is recommended for a set-it-and-forget-it setup.

  - This profile prefers 4K releases with **HDR** and **Dolby Vision**.

  - This profile will fall back to streaming optimized releases groups like **BHDStudio**
  and **hallowed**.

  - This profile will allow HD audio like TrueHD, DTS-X, etc but only if the source
  is WEB-DL

  - Releases **without** HDR fallback are not allowed.'
