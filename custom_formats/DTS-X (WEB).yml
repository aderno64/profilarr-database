name: DTS-X (WEB)
description: Matches releases with DTS-X audio that are not a WEB-DL.
tags:
- Audio
- Codec
conditions:
- name: WEB-DL
  negate: true
  required: true
  source: web_dl
  type: source
- name: DTS-X
  negate: false
  pattern: DTS-X
  required: true
  type: release_title
- name: Not AAC
  negate: true
  pattern: AAC
  required: true
  type: release_title
- name: Not Dolby Digital
  negate: true
  pattern: Dolby Digital
  required: true
  type: release_title
- name: Not Dolby Digital +
  negate: true
  pattern: Dolby Digital +
  required: true
  type: release_title
- name: Not Basic DTS
  negate: true
  pattern: Basic DTS
  required: true
  type: release_title
- name: Not FLAC
  negate: true
  pattern: FLAC
  required: true
  type: release_title
- name: Not PCM
  negate: true
  pattern: PCM
  required: true
  type: release_title
- name: Not TrueHD
  negate: true
  pattern: TrueHD
  required: true
  type: release_title
tests: []
