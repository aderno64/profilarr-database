name: DTS-HD MA (WEB)
description: Matches releases with DTS-HD audio that are not a WEB-DL.
tags:
- Audio
conditions:
- name: WEB-DL
  negate: true
  required: true
  source: web_dl
  type: source
- name: DTS-HD MA
  negate: false
  pattern: DTS-HD MA
  required: true
  type: release_title
- name: Not AAC
  negate: true
  pattern: AAC
  required: true
  type: release_title
- name: Not Dolby Digital
  negate: true
  pattern: Dolby Digital
  required: true
  type: release_title
- name: Not Dolby Digital +
  negate: true
  pattern: Dolby Digital +
  required: true
  type: release_title
- name: Not DTS-HD HRA ES
  negate: true
  pattern: DTS-HD HRA-ES
  required: true
  type: release_title
- name: Not DTS-X
  negate: true
  pattern: DTS-X
  required: true
  type: release_title
- name: Not FLAC
  negate: true
  pattern: FLAC
  required: true
  type: release_title
- name: Not PCM
  negate: true
  pattern: PCM
  required: true
  type: release_title
- name: Not TrueHD
  negate: true
  pattern: TrueHD
  required: true
  type: release_title
tests: []
